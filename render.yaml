# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: league-planning
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DIST_PATH
        value: /app/dist
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_USER
        sync: false
      - key: MONGODB_PASSWORD
        sync: false
      - key: MONGODB_HOST
        sync: false
      - key: MONGODB_DB
        value: league_planning
